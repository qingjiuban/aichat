【十四、针对你的建议】

            authError.innerText = "请输入邮箱和密码";

        }
        authError.innerText = "";
        authButton.disabled = true;

            result = await supabaseClient.auth.signInWithPassword({ email, password });

            result = await supabaseClient.auth.signUp({ email, password });

        authButton.disabled = false;
        authButton.innerText = isAuthMode ? "登录" : "注册";

        }

        const { data: historyData } = await supabaseClient.from("conversations").select("*").eq("user_id", currentUser.id).order("created_at", { ascending: true });

        setupEventListeners();

    function loadSettings() {
        const stored = localStorage.getItem("user_settings");
        if (stored) {
            try {
                const settings = JSON.parse(stored);
                temperature = settings.temperature ?? 0.7;
                topP = settings.topP ?? 0.9;
                freqPenalty = settings.freqPenalty ?? 0;
                maxTokens = settings.maxTokens ?? 2000;
                temperatureSlider.value = temperature;

                maxTokensInput.value = maxTokens;
            } catch(e) {}
        }
    }

    }

    function loadTemplates() {
        const stored = localStorage.getItem("templates");
        if (stored) try { templates = JSON.parse(stored); } catch(e) {}
        updateTemplateSelect();
    }
    function updateTemplateSelect() {
        templateSelect.innerHTML = "";
        templates.forEach((t, idx) => {
            const opt = document.createElement("option");
            opt.value = idx;
            opt.textContent = t.name;
            templateSelect.appendChild(opt);
        });
    }
    function saveTemplates() { localStorage.setItem("templates", JSON.stringify(templates)); }

    function saveHistory() {
        if (conversationHistory.length > 100) conversationHistory = conversationHistory.slice(-100);
        localStorage.setItem("chat_history", JSON.stringify(conversationHistory));
        if (supabaseClient && currentUser) {
            supabaseClient.from("conversations").delete().eq("user_id", currentUser.id).then(() => {
                const inserts = conversationHistory.map(msg => ({
                    user_id: currentUser.id,
                    role: msg.role,
                    content: msg.content,
                    model: "智谱GLM-4.7"
                }));
                supabaseClient.from("conversations").insert(inserts).then();
            });
        }
    }
    function renderChat() {
        chatArea.innerHTML = "";
        for (let msg of conversationHistory) {
            addMessageToUI(msg.role, msg.content);
        }
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    function addMessageToUI(role, content) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}`;
        const roleTag = document.createElement("div");
        roleTag.className = "role-tag";
        roleTag.innerText = role === "user" ? "你" : "🤖 智谱AI";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        if (role === "assistant") {
            bubble.innerHTML = marked.parse(content);
            bubble.querySelectorAll("pre code").forEach(block => hljs.highlightElement(block));
        } else {
            bubble.innerText = content;
        }
        msgDiv.appendChild(roleTag);
        msgDiv.appendChild(bubble);
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    function addUserMessage(text) {
        addMessageToUI("user", text);
        conversationHistory.push({ role: "user", content: text });
        saveHistory();
    }
    function addAssistantMessage(text) {
        addMessageToUI("assistant", text);
        conversationHistory.push({ role: "assistant", content: text });
        saveHistory();
    }
    let typingInterval;
    function typeWriter(element, text, speed = 15) {
        let i = 0;
        element.innerHTML = "";
        return new Promise(resolve => {
            typingInterval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text[i];
                    i++;
                } else {
                    clearInterval(typingInterval);
                    resolve();
                }
            }, speed);
        });
    }
    async function callAPI(prompt) {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model: MODEL_ID, prompt, temperature, topP, freqPenalty, maxTokens })
        });
        if (!response.ok) throw new Error(await response.text());
        const data = await response.json();
        return data.content;
    }
    function buildContextPrompt(userInputText) {
        const recent = conversationHistory.slice(-8);
        let context = "";
        for (let msg of recent) context += `${msg.role === "user" ? "用户" : "助手"}: ${msg.content}\n`;
        context += `用户: ${userInputText}\n助手:`;
        return `${systemPrompt}\n\n对话历史:\n${context}`;
    }
    async function askWithPipeline(userMessage) {
        const fullPrompt = buildContextPrompt(userMessage);
        const answer = await callAPI(fullPrompt);
        return answer;
    }

    let isSending = false;
    async function handleSend() {
        if (isSending) return;
        const text = userInput.value.trim();
        if (!text) return;
        isSending = true;
        sendBtn.disabled = true;

        userInput.value = '';
        addUserMessage(text);
        const thinkingDiv = document.createElement("div");
        thinkingDiv.className = "thinking";
        thinkingDiv.innerText = "🦞 思考中...";
        chatArea.appendChild(thinkingDiv);

        try {
            const answer = await askWithPipeline(text);
            thinkingDiv.remove();
            const msgDiv = document.createElement("div");
            msgDiv.className = "message assistant";
            const roleTag = document.createElement("div");
            roleTag.className = "role-tag";
            roleTag.innerText = "🤖 智谱AI";
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            msgDiv.appendChild(roleTag);
            msgDiv.appendChild(bubble);
            chatArea.appendChild(msgDiv);
            await typeWriter(bubble, answer, 15);
            conversationHistory.push({ role: "assistant", content: answer });
            saveHistory();
        } catch (err) {
            thinkingDiv.remove();
            addAssistantMessage(`❌ 调用失败: ${err.message}`);
            if (conversationHistory.length && conversationHistory[conversationHistory.length-1].role === "user") {
                conversationHistory.pop();
                saveHistory();
            }
        } finally {
            isSending = false;
            sendBtn.disabled = false;
        }
    }

    function clearHistory() {
        conversationHistory = [];
        saveHistory();
        renderChat();
        addAssistantMessage("对话记录已清空。");
    }

    function exportData() {
        const data = {
            history: conversationHistory,
            templates: templates,
            settings: { temperature, topP, freqPenalty, maxTokens }
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `zhipu_backup_${new Date().toISOString()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }
    function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.history) { conversationHistory = data.history; saveHistory(); renderChat(); }
                if (data.templates) { templates = data.templates; saveTemplates(); updateTemplateSelect(); }
                if (data.settings) {
                    temperature = data.settings.temperature ?? 0.7;
                    topP = data.settings.topP ?? 0.9;
                    freqPenalty = data.settings.freqPenalty ?? 0;
                    maxTokens = data.settings.maxTokens ?? 2000;
                    temperatureSlider.value = temperature; tempValue.innerText = temperature;
                    topPSlider.value = topP; topPValue.innerText = topP;
                    freqPenaltySlider.value = freqPenalty; freqValue.innerText = freqPenalty;
                    maxTokensInput.value = maxTokens;
                    saveSettings();
                }
                addAssistantMessage("✅ 数据导入成功！", "系统");
            } catch (err) { alert("导入失败: " + err.message); }
        };
        reader.readAsText(file);
    }

    function setupEventListeners() {
        sendBtn.addEventListener("click", handleSend);
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                if (!isSending) handleSend();
            }
        });
        themeToggle.addEventListener("click", () => {
            document.body.classList.toggle("dark");
            const dark = document.body.classList.contains("dark");
            localStorage.setItem("theme", dark ? "dark" : "light");
            themeToggle.innerText = dark ? "☀️" : "🌙";
        });
        settingsBtn.addEventListener("click", () => { drawer.classList.add("open"); overlay.classList.add("active"); });
        closeDrawer.addEventListener("click", () => { drawer.classList.remove("open"); overlay.classList.remove("active"); });
        overlay.addEventListener("click", () => { drawer.classList.remove("open"); overlay.classList.remove("active"); });
        clearHistoryBtn.addEventListener("click", clearHistory);
        backupBtn.addEventListener("click", exportData);
        restoreBtn.addEventListener("click", () => restoreFile.click());
        restoreFile.addEventListener("change", (e) => { if (e.target.files[0]) importData(e.target.files[0]); restoreFile.value = ""; });

        temperatureSlider.addEventListener("input", () => {
            temperature = parseFloat(temperatureSlider.value);
            tempValue.innerText = temperature;
            saveSettings();
        });
        topPSlider.addEventListener("input", () => {
            topP = parseFloat(topPSlider.value);
            topPValue.innerText = topP;
            saveSettings();
        });
        freqPenaltySlider.addEventListener("input", () => {
            freqPenalty = parseFloat(freqPenaltySlider.value);
            freqValue.innerText = freqPenalty;
            saveSettings();
        });
        maxTokensInput.addEventListener("change", () => {
            maxTokens = parseInt(maxTokensInput.value);
            saveSettings();
        });

        insertTemplateBtn.addEventListener("click", () => {
            const idx = templateSelect.value;
            if (idx !== null) {
                const tpl = templates[parseInt(idx)];
                userInput.value = tpl.content;
            }
        });
        saveTemplateBtn.addEventListener("click", () => {
            const name = prompt("模板名称：");
            if (name && userInput.value.trim()) {
                templates.push({ name, content: userInput.value.trim() });
                saveTemplates();
                updateTemplateSelect();
                addAssistantMessage(`模板「${name}」已保存。`, "系统");
            }
        });

        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") document.body.classList.add("dark");
        else document.body.classList.remove("dark");
        themeToggle.innerText = savedTheme === "dark" ? "☀️" : "🌙";
    }
</script>
</body>
</html>
