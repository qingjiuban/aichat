【十三、综合建议】  
【十四、针对你的建议】  
【十五、不确定性说明】

【核心原则（最重要）】

    // ======================== 默认免费模型列表 ========================
    const DEFAULT_MODELS = [
        { display: "MiMo-V2-Flash (免费)", value: "openrouter:xiaomi/mimo-v2-flash:free" },
        { display: "MiMo-V2-Omni (免费)", value: "openrouter:xiaomi/mimo-v2-omni:free" },
        { display: "GLM-4.5-Air (免费)", value: "openrouter:zai-org/glm-4.5-air:free" },
        { display: "Nemotron 3 Super (免费)", value: "openrouter:nvidia/nemotron-3-super-120b:free" },
        { display: "Trinity Mini (免费)", value: "openrouter:arcee-ai/trinity-mini:free" },
        { display: "Mistral Small 3.1 (免费)", value: "openrouter:mistralai/mistral-small-3.1-24b-instruct:free" },
        { display: "Qwen3-Next 80B (免费)", value: "openrouter:qwen/qwen3-next-80b-instruct:free" }
    ];

    // 全局变量
    let modelList = [];
    let conversationHistory = [];
    let systemPrompt = SYSTEM_PROMPT;
    let supabaseClient = null;
    let currentUser = null;
    let isAuthMode = true; // true: 登录, false: 注册

    // DOM 元素
    const authContainer = document.getElementById("authContainer");
    const mainApp = document.getElementById("mainApp");
    const authEmail = document.getElementById("authEmail");
    const authPassword = document.getElementById("authPassword");
    const authButton = document.getElementById("authButton");
    const authError = document.getElementById("authError");
    const toggleAuthMode = document.getElementById("toggleAuthMode");
    const modelSelect = document.getElementById("modelSelect");
    const themeToggle = document.getElementById("themeToggle");
    const chatArea = document.getElementById("chatArea");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");

    // Supabase 客户端
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 检查是否已有登录会话
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
        if (session) {
            currentUser = session.user;
            showMainApp();
            loadUserData();
        } else {
            authContainer.style.display = "flex";
            mainApp.classList.remove("visible");
        }
    });

    // 切换登录/注册模式
    toggleAuthMode.addEventListener("click", () => {
        isAuthMode = !isAuthMode;
        if (isAuthMode) {
            authButton.innerText = "登录";
            toggleAuthMode.innerText = "没有账号？立即注册";
        } else {
            authButton.innerText = "注册";
            toggleAuthMode.innerText = "已有账号？去登录";
        }
        authError.innerText = "";
    });

    // 处理登录/注册
    authButton.addEventListener("click", async () => {
        const email = authEmail.value.trim();
        const password = authPassword.value;
        if (!email || !password) {
            authError.innerText = "请输入邮箱和密码";
            return;
        }
        authError.innerText = "";
        authButton.disabled = true;
        authButton.innerText = isAuthMode ? "登录中..." : "注册中...";
        let result;
        if (isAuthMode) {
            result = await supabaseClient.auth.signInWithPassword({ email, password });
        } else {
            result = await supabaseClient.auth.signUp({ email, password });
        }
        authButton.disabled = false;
        authButton.innerText = isAuthMode ? "登录" : "注册";
        if (result.error) {
            authError.innerText = result.error.message;
        } else {
            currentUser = result.data.user;
            showMainApp();
            loadUserData();
        }
    });

    function showMainApp() {
        authContainer.style.display = "none";
        mainApp.classList.add("visible");
    }

    async function loadUserData() {
        // 加载模型列表
        const { data: modelsData } = await supabaseClient.from("user_models").select("*").eq("user_id", currentUser.id);
        if (modelsData && modelsData.length > 0) {
            modelList = modelsData.map(m => ({ display: m.display, value: m.model_value }));
        } else {
            modelList = [...DEFAULT_MODELS];
        }
        renderModelSelect();

        // 加载对话历史
        const { data: historyData } = await supabaseClient.from("conversations").select("*").eq("user_id", currentUser.id).order("created_at", { ascending: true });
        if (historyData && historyData.length) {
            conversationHistory = historyData.map(h => ({ role: h.role, content: h.content, model: h.model }));
        } else {
            conversationHistory = [];
        }
        renderChat();

        loadTheme();
        setupEventListeners();
    }

    function loadTheme() {
        const dark = localStorage.getItem("theme") === "dark";
        if (dark) document.body.classList.add("dark");
        themeToggle.innerText = dark ? "☀️" : "🌙";
    }
    function toggleTheme() {
        document.body.classList.toggle("dark");
        const dark = document.body.classList.contains("dark");
        localStorage.setItem("theme", dark ? "dark" : "light");
        themeToggle.innerText = dark ? "☀️" : "🌙";
    }
    function renderModelSelect() {
        modelSelect.innerHTML = "";
        modelList.forEach((m, idx) => {
            const opt = document.createElement("option");
            opt.value = m.value;
            opt.textContent = `${idx+1}. ${m.display}`;
            modelSelect.appendChild(opt);
        });
    }
    function saveModels() {
        if (supabaseClient && currentUser) {
            supabaseClient.from("user_models").delete().eq("user_id", currentUser.id).then(() => {
                const inserts = modelList.map(m => ({ user_id: currentUser.id, display: m.display, model_value: m.value }));
                supabaseClient.from("user_models").insert(inserts).then();
            });
        }
        localStorage.setItem("model_list", JSON.stringify(modelList));
    }
    function saveHistory() {
        if (conversationHistory.length > 100) conversationHistory = conversationHistory.slice(-100);
        localStorage.setItem("chat_history", JSON.stringify(conversationHistory));
        if (supabaseClient && currentUser) {
            supabaseClient.from("conversations").delete().eq("user_id", currentUser.id).then(() => {
                const inserts = conversationHistory.map(msg => ({
                    user_id: currentUser.id,
                    role: msg.role,
                    content: msg.content,
                    model: msg.model || null
                }));
                supabaseClient.from("conversations").insert(inserts).then();
            });
        }
    }
    function renderChat() {
        chatArea.innerHTML = "";
        for (let msg of conversationHistory) {
            addMessageToUI(msg.role, msg.content, msg.model);
        }
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    function addMessageToUI(role, content, modelName = "") {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}`;
        const roleTag = document.createElement("div");
        roleTag.className = "role-tag";
        roleTag.innerText = role === "user" ? "你" : (modelName ? `🤖 ${modelName}` : "🦞 助手");
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        if (role === "assistant") {
            bubble.innerHTML = marked.parse(content);
            bubble.querySelectorAll("pre code").forEach(block => hljs.highlightElement(block));
        } else {
            bubble.innerText = content;
        }
        msgDiv.appendChild(roleTag);
        msgDiv.appendChild(bubble);
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    function addUserMessage(text) {
        addMessageToUI("user", text);
        conversationHistory.push({ role: "user", content: text });
        saveHistory();
    }
    function addAssistantMessage(text, modelName = "") {
        addMessageToUI("assistant", text, modelName);
        conversationHistory.push({ role: "assistant", content: text, model: modelName });
        saveHistory();
    }
    let typingInterval;
    function typeWriter(element, text, speed = 15) {
        let i = 0;
        element.innerHTML = "";
        return new Promise(resolve => {
            typingInterval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text[i];
                    i++;
                } else {
                    clearInterval(typingInterval);
                    resolve();
                }
            }, speed);
        });
    }
    async function callAPI(model, prompt) {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model, prompt })
        });
        if (!response.ok) throw new Error(await response.text());
        const data = await response.json();
        return data.content;
    }
    function buildContextPrompt(userInputText) {
        const recent = conversationHistory.slice(-8);
        let context = "";
        for (let msg of recent) context += `${msg.role === "user" ? "用户" : "助手"}: ${msg.content}\n`;
        context += `用户: ${userInputText}\n助手:`;
        return `${systemPrompt}\n\n对话历史:\n${context}`;
    }
    async function askWithPipeline(userMessage) {
        const selectedModel = modelSelect.value;
        const fullPrompt = buildContextPrompt(userMessage);
        const answer = await callAPI(selectedModel, fullPrompt);
        return answer;
    }
    function handleCommand(input) {
        const trimmed = input.trim().toLowerCase();
        const parts = trimmed.split(/\s+/);
        const cmd = parts[0];
        if (cmd === '/list') {
            let msg = '📋 当前可用模型列表：\n';
            modelList.forEach((m, idx) => msg += `${idx+1}. ${m.display} → ${m.value}\n`);
            addAssistantMessage(msg, '系统指令');
            return true;
        }
        if (cmd === '/switch') {
            if (parts.length < 2) { addAssistantMessage('用法：/switch <序号> 或 /switch <模型名>', '系统指令'); return true; }
            const target = parts.slice(1).join(' ');
            let idx = parseInt(target);
            if (!isNaN(idx) && idx >= 1 && idx <= modelList.length) {
                modelSelect.value = modelList[idx-1].value;
                addAssistantMessage(`✅ 已切换到 ${modelList[idx-1].display}`, '系统指令');
                return true;
            }
            const matched = modelList.find(m => m.display.toLowerCase().includes(target));
            if (matched) {
                modelSelect.value = matched.value;
                addAssistantMessage(`✅ 已切换到 ${matched.display}`, '系统指令');
                return true;
            }
            addAssistantMessage(`未找到匹配的模型：${target}`, '系统指令');
            return true;
        }
        if (cmd === '/add') {
            if (parts.length < 3) { addAssistantMessage('用法：/add "显示名" 模型标识符', '系统指令'); return true; }
            let display, value;
            if (input.match(/^\/add\s+"([^"]+)"\s+(\S+)/)) {
                const match = input.match(/^\/add\s+"([^"]+)"\s+(\S+)/);
                display = match[1]; value = match[2];
            } else {
                display = parts[1]; value = parts[2];
            }
            if (modelList.some(m => m.value === value)) { addAssistantMessage(`模型标识符 ${value} 已存在`, '系统指令'); return true; }
            modelList.push({ display, value });
            saveModels();
            renderModelSelect();
            addAssistantMessage(`✅ 已添加模型：${display} (${value})`, '系统指令');
            return true;
        }
        if (cmd === '/remove') {
            if (parts.length < 2) { addAssistantMessage('用法：/remove <序号> 或 /remove <模型名>', '系统指令'); return true; }
            const target = parts.slice(1).join(' ');
            let idx = parseInt(target);
            let removed = null;
            if (!isNaN(idx) && idx >= 1 && idx <= modelList.length) removed = modelList.splice(idx-1, 1)[0];
            else {
                const idxMatch = modelList.findIndex(m => m.display.toLowerCase().includes(target));
                if (idxMatch !== -1) removed = modelList.splice(idxMatch, 1)[0];
            }
            if (removed) {
                saveModels();
                renderModelSelect();
                addAssistantMessage(`🗑️ 已删除模型：${removed.display}`, '系统指令');
            } else addAssistantMessage(`未找到要删除的模型：${target}`, '系统指令');
            return true;
        }
        return false;
    }

    let isSending = false;
    async function handleSend() {
        if (isSending) return;
        const text = userInput.value.trim();
        if (!text) return;
        isSending = true;
        sendBtn.disabled = true;

        if (text.startsWith('/')) {
            if (handleCommand(text)) {
                userInput.value = '';
                isSending = false;
                sendBtn.disabled = false;
                return;
            }
        }

        userInput.value = '';
        addUserMessage(text);
        const thinkingDiv = document.createElement("div");
        thinkingDiv.className = "thinking";
        thinkingDiv.innerText = "🦞 思考中...";
        chatArea.appendChild(thinkingDiv);

        try {
            const answer = await askWithPipeline(text);
            thinkingDiv.remove();
            const msgDiv = document.createElement("div");
            msgDiv.className = "message assistant";
            const roleTag = document.createElement("div");
            roleTag.className = "role-tag";
            roleTag.innerText = `🤖 ${modelSelect.options[modelSelect.selectedIndex]?.text || "AI助手"}`;
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            msgDiv.appendChild(roleTag);
            msgDiv.appendChild(bubble);
            chatArea.appendChild(msgDiv);
            await typeWriter(bubble, answer, 15);
            conversationHistory.push({ role: "assistant", content: answer, model: modelSelect.options[modelSelect.selectedIndex]?.text });
            saveHistory();
        } catch (err) {
            thinkingDiv.remove();
            addAssistantMessage(`❌ 调用失败: ${err.message}`);
            if (conversationHistory.length && conversationHistory[conversationHistory.length-1].role === "user") {
                conversationHistory.pop();
                saveHistory();
            }
        } finally {
            isSending = false;
            sendBtn.disabled = false;
        }
    }

    function clearHistory() {
        conversationHistory = [];
        saveHistory();
        renderChat();
        addAssistantMessage("对话记录已清空。");
    }

    function setupEventListeners() {
        sendBtn.addEventListener("click", handleSend);
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                if (!isSending) handleSend();
            }
        });
        themeToggle.addEventListener("click", toggleTheme);
        clearHistoryBtn.addEventListener("click", clearHistory);
    }
</script>
