    <style>
        /* 样式与之前完全一致，此处省略，实际使用时请保留原样式 */
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; transition: background 0.3s, color 0.3s; }
        body { margin: 0; padding: 10px; height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg-primary); }
        :root {
            --bg-primary: #f7f9fc;
            --bg-secondary: #ffffff;
            --text-primary: #1e2a3a;
            --text-secondary: #64748b;

            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --accent: #f97316;
            --accent-hover: #fb923c;

            left: 0;

            align-items: center;

        .login-card {
            background: var(--bg-primary);
            border-radius: 32px;

            width: 90%;
            max-width: 360px;

            width: 100%;

        .compact-select, .compact-btn {
            padding: 4px 8px;

            border-radius: 20px;

        .compact-btn { background: var(--accent); color: white; border: none; }
        .compact-btn:hover { background: var(--accent-hover); }

            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 14px;

        .drawer { position: fixed; right: 0; top: 0; width: 280px; height: 100%; background: var(--bg-secondary); box-shadow: -2px 0 10px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.3s; z-index: 1000; padding: 16px; overflow-y: auto; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 999; }

        pre code.hljs { background: transparent; }

            .message { max-width: 95%; }

<script>
    // ======================== Supabase 配置（请替换为你的实际值） ========================
    const SUPABASE_URL = "https://你的项目.supabase.co";
    const SUPABASE_ANON_KEY = "你的anon密钥";

    // ======================== 命理分析系统核心提示词（增加典籍列表） ========================
    const SYSTEM_PROMPT = `你是一个融合传统命理体系与现代结构化推理能力的高级命理分析系统。

你的分析基于以下经典命理著作的核心思想：
《滴天髓》、《穷通宝鉴》、《三命通会》、《子平真诠》、《渊海子平》、《星平会海》、《命理探原》、《千里命稿》、《神峰通考》、《五行大义》等。

并严格遵循结构化规则推理、概率模型、评分机制与经验命例进行综合判断。

--------------------------------------

【系统核心能力】

你必须具备以下能力：

1. 八字结构分析（五行/天干地支）
2. 日主强弱判断
3. 十神分析（财官印比食伤）
4. 格局判断（正格 / 从格 / 特殊格）
5. 用神推导（扶抑 / 调候 / 通关）
6. 大运流年分析
7. 合婚分析
8. 断事推理（事件级输出）
9. 多路径概率推演
10. 评分量化系统
11. 命例经验参考
12. 用户画像适配
13. 稳定人格表达

--------------------------------------

【推理总流程（必须严格执行）】

① 日主识别（核心）
② 月令判断（环境）
③ 五行分布分析（结构）
④ 日主强弱判断（定性+定量）
⑤ 格局判断（按决策树）
⑥ 用神推导（核心步骤）
⑦ 十神结构分析
⑧ 五行流通/冲突分析
⑨ 大运流年叠加分析
⑩ 现实映射（性格/事业/财运/婚姻）
⑪ 断事（具体事件）
⑫ 多路径概率推演
⑬ 评分输出
⑭ 个性化建议（结合用户画像）

禁止跳步骤。

--------------------------------------

【用神判断规则】

遵循优先级：

1. 调候（寒暖燥湿）
2. 扶抑（日主强弱）
3. 通关（冲突缓解）

原则：
- 强则抑之
- 弱则扶之

必须说明：
- 用神
- 忌神
- 推导原因

--------------------------------------

【格局判断规则】

流程：

1. 看月令
2. 看日主与月令关系
3. 判断：

- 正格（财/官/印/食伤）
- 从格（从财/从官/从强等）
- 特殊格

必须说明：
- 格局类型
- 判断依据
- 格局纯度
- 格局层次

--------------------------------------

【大运流年规则】

判断：

- 生用神 → 吉
- 克用神 → 凶

重点：

- 冲 → 变动
- 合 → 关系
- 刑 → 冲突
- 害 → 隐患

必须给：
- 阶段变化
- 时间节点
- 趋势（上升/波动/下降）

--------------------------------------

【断事规则（必须具体）】

输出必须包含：

【时间】
【事件类型】
【具体事件】
【原因】
【建议】

禁止抽象描述。

--------------------------------------

【事件映射】

财 → 收入/资金  
官 → 事业/压力  
印 → 学习/贵人  
比劫 → 竞争/人际  
食伤 → 创业/表达  

--------------------------------------

【概率推理系统】

必须输出多路径：

路径A（主）50%+  
路径B（次）20~40%  
路径C（极端）<20%

每条路径必须包含：

- 条件
- 结果
- 概率

--------------------------------------

【评分系统】

必须输出：

- 日主强度（0-100）
- 五行平衡（0-100）
- 格局稳定（0-100）
- 运势波动（0-100）
- 综合层次（0-100）

必须说明评分依据。

--------------------------------------

【命例参考机制】

如存在类似结构：

- 引用类似命例
- 说明相似点
- 用于增强判断

--------------------------------------

【用户画像适配】

根据用户特点调整：

- 理性 → 强逻辑
- 焦虑 → 强解释 + 稳定
- 冲动 → 强风险提示

必须输出：

【针对你的建议】

--------------------------------------

【人格系统】

你必须保持：

- 稳定风格（类似固定大师）
- 理性、沉稳
- 不讨好、不恐吓
- 有结论、有依据

--------------------------------------

【不确定性说明】

必须包含：

- 分析非绝对预测
- 存在变量
- 建议理性参考

--------------------------------------

【输出结构（强制）】

【一、五行分析】  
【二、格局判断】  
【三、用神分析】  
【四、十神结构】  
【五、性格分析】  
【六、事业分析】  
【七、财运分析】  
【八、婚姻分析】  
【九、大运趋势】  
【十、断事（具体事件）】  
【十一、多路径推演】  
【十二、命理评分】  
【十三、综合建议】  
【十四、针对你的建议】  
【十五、不确定性说明】

--------------------------------------

【核心原则（最重要）】

1. 所有结论必须来自结构推理  
2. 必须有因果链  
3. 不允许胡编  
4. 不允许模糊  
5. 不允许只有结论没有解释  

--------------------------------------

【最终目标】

让用户感受到：

- 分析有逻辑  
- 结论有依据  
- 内容有深度  
- 表达像真人大师  

而不是AI生成`;

    // ======================== 免费模型列表 ========================
    const FREE_MODELS = [
        { display: "MiMo-V2-Flash (OpenRouter 免费)", value: "openrouter:xiaomi/mimo-v2-flash:free" },
        { display: "MiMo-V2-Omni (OpenRouter 免费)", value: "openrouter:xiaomi/mimo-v2-omni:free" },
        { display: "GLM-4.5-Air (OpenRouter 免费)", value: "openrouter:zai-org/glm-4.5-air:free" },
        { display: "Nemotron 3 Super (OpenRouter 免费)", value: "openrouter:nvidia/nemotron-3-super-120b:free" },
        { display: "Trinity Mini (OpenRouter 免费)", value: "openrouter:arcee-ai/trinity-mini:free" },
        { display: "Mistral Small 3.1 (OpenRouter 免费)", value: "openrouter:mistralai/mistral-small-3.1-24b-instruct:free" },
        { display: "Qwen3-Next 80B (OpenRouter 免费)", value: "openrouter:qwen/qwen3-next-80b-instruct:free" }
    ];
    const DEFAULT_MODELS = [...FREE_MODELS];

    let templates = [
        { name: "提供出生信息", content: "请提供您的出生信息（阳历或阴历年月日时，以及地点），我会为您进行详细命理分析。" }
    ];

    // 全局变量（移除温度等参数，不再使用）
    let modelList = [];
    let conversationHistory = [];
    let systemPrompt = SYSTEM_PROMPT;
    let supabaseClient = null;
    let currentUser = null;

    // DOM 元素
    const loginContainer = document.getElementById("loginContainer");
    const mainApp = document.getElementById("mainApp");
    const loginEmail = document.getElementById("loginEmail");
    const loginPassword = document.getElementById("loginPassword");
    const loginButton = document.getElementById("loginButton");
    const loginError = document.getElementById("loginError");
    const modelSelect = document.getElementById("modelSelect");
    const themeToggle = document.getElementById("themeToggle");
    const settingsBtn = document.getElementById("settingsBtn");
    const chatArea = document.getElementById("chatArea");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const voiceBtn = document.getElementById("voiceBtn");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");
    const overlay = document.getElementById("overlay");
    const drawer = document.getElementById("drawer");
    const closeDrawer = document.getElementById("closeDrawer");
    const templateSelect = document.getElementById("templateSelect");
    const insertTemplateBtn = document.getElementById("insertTemplateBtn");
    const saveTemplateBtn = document.getElementById("saveTemplateBtn");
    const backupBtn = document.getElementById("backupBtn");
    const restoreBtn = document.getElementById("restoreBtn");
    const restoreFile = document.getElementById("restoreFile");

    // Supabase 初始化
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
        if (session) {
            currentUser = session.user;
            showMainApp();
            loadUserData();
        } else {
            loginContainer.style.display = "flex";
            mainApp.classList.remove("visible");
        }
    });

    function showMainApp() {
        loginContainer.style.display = "none";
        mainApp.classList.add("visible");
    }

    loginButton.addEventListener("click", async () => {
        const email = loginEmail.value.trim();
        const password = loginPassword.value;
        if (!email || !password) {
            loginError.innerText = "请输入邮箱和密码";
            return;
        }
        loginError.innerText = "";
        loginButton.disabled = true;
        loginButton.innerText = "登录中...";
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        loginButton.disabled = false;
        loginButton.innerText = "登录";
        if (error) {
            loginError.innerText = error.message;
        } else {
            currentUser = data.user;
            showMainApp();
            loadUserData();
        }
    });

    async function loadUserData() {
        const { data: modelsData } = await supabaseClient.from("user_models").select("*").eq("user_id", currentUser.id);
        if (modelsData && modelsData.length > 0) {
            modelList = modelsData.map(m => ({ display: m.display, value: m.model_value }));
        } else {
            modelList = [...DEFAULT_MODELS];
        }
        renderModelSelect();

        const { data: historyData } = await supabaseClient.from("conversations").select("*").eq("user_id", currentUser.id).order("created_at", { ascending: true });
        if (historyData && historyData.length) {
            conversationHistory = historyData.map(h => ({ role: h.role, content: h.content, model: h.model }));
        } else {
            conversationHistory = [];
        }
        renderChat();

        loadTheme();
        loadTemplates();
        setupEventListeners();
    }

    function loadTheme() {
        const dark = localStorage.getItem("theme") === "dark";
        if (dark) document.body.classList.add("dark");
        themeToggle.innerText = dark ? "☀️" : "🌙";
    }
    function toggleTheme() {
        document.body.classList.toggle("dark");
        const dark = document.body.classList.contains("dark");
        localStorage.setItem("theme", dark ? "dark" : "light");
        themeToggle.innerText = dark ? "☀️" : "🌙";
    }
    function renderModelSelect() {
        modelSelect.innerHTML = "";
        modelList.forEach((m, idx) => {
            const opt = document.createElement("option");
            opt.value = m.value;
            opt.textContent = `${idx+1}. ${m.display}`;
            modelSelect.appendChild(opt);
        });
    }
    function saveModels() {
        if (supabaseClient && currentUser) {
            supabaseClient.from("user_models").delete().eq("user_id", currentUser.id).then(() => {
                const inserts = modelList.map(m => ({ user_id: currentUser.id, display: m.display, model_value: m.value }));
                supabaseClient.from("user_models").insert(inserts).then();
            });
        }
        localStorage.setItem("model_list", JSON.stringify(modelList));
    }
    function saveHistory() {
        if (conversationHistory.length > 100) conversationHistory = conversationHistory.slice(-100);
        localStorage.setItem("chat_history", JSON.stringify(conversationHistory));
        if (supabaseClient && currentUser) {
            supabaseClient.from("conversations").delete().eq("user_id", currentUser.id).then(() => {
                const inserts = conversationHistory.map(msg => ({
                    user_id: currentUser.id,
                    role: msg.role,
                    content: msg.content,
                    model: msg.model || null
                }));
                supabaseClient.from("conversations").insert(inserts).then();
            });
        }
    }
    function loadTemplates() {
        const stored = localStorage.getItem("templates");
        if (stored) try { templates = JSON.parse(stored); } catch(e) {}
        updateTemplateSelect();
    }
    function updateTemplateSelect() {
        templateSelect.innerHTML = "";
        templates.forEach((t, idx) => {
            const opt = document.createElement("option");
            opt.value = idx;
            opt.textContent = t.name;
            templateSelect.appendChild(opt);
        });
    }
    function saveTemplates() { localStorage.setItem("templates", JSON.stringify(templates)); }
    function renderChat() {
        chatArea.innerHTML = "";
        for (let msg of conversationHistory) {
            addMessageToUI(msg.role, msg.content, msg.model);
        }
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    function addMessageToUI(role, content, modelName = "") {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}`;
        const roleTag = document.createElement("div");
        roleTag.className = "role-tag";
        roleTag.innerText = role === "user" ? "你" : (modelName ? `🤖 ${modelName}` : "🦞 命理师");
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        if (role === "assistant") {
            bubble.innerHTML = marked.parse(content);
            bubble.querySelectorAll("pre code").forEach(block => hljs.highlightElement(block));
        } else {
            bubble.innerText = content;
        }
        msgDiv.appendChild(roleTag);
        msgDiv.appendChild(bubble);
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    function addUserMessage(text) {
        addMessageToUI("user", text);
        conversationHistory.push({ role: "user", content: text });
        saveHistory();
    }
    function addAssistantMessage(text, modelName = "") {
        addMessageToUI("assistant", text, modelName);
        conversationHistory.push({ role: "assistant", content: text, model: modelName });
        saveHistory();
    }
    let typingInterval;
    function typeWriter(element, text, speed = 15) {
        let i = 0;
        element.innerHTML = "";
        return new Promise(resolve => {
            typingInterval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text[i];
                    i++;
                } else {
                    clearInterval(typingInterval);
                    resolve();
                }
            }, speed);
        });
    }
    async function callAPI(model, prompt, params = {}) {
        // 移除了 temperature 等参数，使用模型默认值
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model, prompt })
        });
        if (!response.ok) throw new Error(await response.text());
        const data = await response.json();
        return data.content;
    }
    function buildContextPrompt(userInputText) {
        const recent = conversationHistory.slice(-8);
        let context = "";
        for (let msg of recent) context += `${msg.role === "user" ? "用户" : "助手"}: ${msg.content}\n`;
        context += `用户: ${userInputText}\n助手:`;
        return `${systemPrompt}\n\n对话历史:\n${context}`;
    }
    async function askWithPipeline(userMessage) {
        let selectedModel = modelSelect.value;
        const fullPrompt = buildContextPrompt(userMessage);
        const answer = await callAPI(selectedModel, fullPrompt);
        return answer;
    }
    function handleCommand(input) {
        const trimmed = input.trim().toLowerCase();
        const parts = trimmed.split(/\s+/);
        const cmd = parts[0];
        if (cmd === '/list') {
            let msg = '📋 当前可用模型列表：\n';
            modelList.forEach((m, idx) => msg += `${idx+1}. ${m.display} → ${m.value}\n`);
            addAssistantMessage(msg, '系统指令');
            return true;
        }
        if (cmd === '/switch') {
            if (parts.length < 2) { addAssistantMessage('用法：/switch <序号> 或 /switch <模型名>', '系统指令'); return true; }
            const target = parts.slice(1).join(' ');
            let idx = parseInt(target);
            if (!isNaN(idx) && idx >= 1 && idx <= modelList.length) {
                modelSelect.value = modelList[idx-1].value;
                addAssistantMessage(`✅ 已切换到 ${modelList[idx-1].display}`, '系统指令');
                return true;
            }
            const matched = modelList.find(m => m.display.toLowerCase().includes(target));
            if (matched) {
                modelSelect.value = matched.value;
                addAssistantMessage(`✅ 已切换到 ${matched.display}`, '系统指令');
                return true;
            }
            addAssistantMessage(`未找到匹配的模型：${target}`, '系统指令');
            return true;
        }
        if (cmd === '/add') {
            if (parts.length < 3) { addAssistantMessage('用法：/add "显示名" 模型标识符', '系统指令'); return true; }
            let display, value;
            if (input.match(/^\/add\s+"([^"]+)"\s+(\S+)/)) {
                const match = input.match(/^\/add\s+"([^"]+)"\s+(\S+)/);
                display = match[1]; value = match[2];
            } else {
                display = parts[1]; value = parts[2];
            }
            if (modelList.some(m => m.value === value)) { addAssistantMessage(`模型标识符 ${value} 已存在`, '系统指令'); return true; }
            modelList.push({ display, value });
            saveModels();
            renderModelSelect();
            addAssistantMessage(`✅ 已添加模型：${display} (${value})`, '系统指令');
            return true;
        }
        if (cmd === '/remove') {
            if (parts.length < 2) { addAssistantMessage('用法：/remove <序号> 或 /remove <模型名>', '系统指令'); return true; }
            const target = parts.slice(1).join(' ');
            let idx = parseInt(target);
            let removed = null;
            if (!isNaN(idx) && idx >= 1 && idx <= modelList.length) removed = modelList.splice(idx-1, 1)[0];
            else {
                const idxMatch = modelList.findIndex(m => m.display.toLowerCase().includes(target));
                if (idxMatch !== -1) removed = modelList.splice(idxMatch, 1)[0];
            }
            if (removed) {
                saveModels();
                renderModelSelect();
                addAssistantMessage(`🗑️ 已删除模型：${removed.display}`, '系统指令');
            } else addAssistantMessage(`未找到要删除的模型：${target}`, '系统指令');
            return true;
        }
        if (cmd === '/template') {
            const tplName = parts.slice(1).join(' ');
            const tpl = templates.find(t => t.name.toLowerCase().includes(tplName));
            if (tpl) { userInput.value = tpl.content; addAssistantMessage(`📋 已插入模板：${tpl.name}`, '系统指令'); }
            else addAssistantMessage(`未找到模板：${tplName}`, '系统指令');
            return true;
        }
        return false;
    }
    let recognition;
    function initSpeech() {
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.interimResults = false;
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                userInput.value = text;
            };
            recognition.onerror = (e) => alert('语音识别错误: ' + e.error);
        } else alert('浏览器不支持语音输入');
    }
    function startSpeech() {
        if (recognition) recognition.start();
    }
    function exportData() {
        const data = {
            models: modelList,
            history: conversationHistory,
            templates: templates
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `lobster_backup_${new Date().toISOString()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }
    function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.models) { modelList = data.models; saveModels(); renderModelSelect(); }
                if (data.history) { conversationHistory = data.history; saveHistory(); renderChat(); }
                if (data.templates) { templates = data.templates; saveTemplates(); updateTemplateSelect(); }
                addAssistantMessage("✅ 数据导入成功！", "系统");
            } catch (err) { alert("导入失败: " + err.message); }
        };
        reader.readAsText(file);
    }

    let isSending = false;
    async function handleSend() {
        if (isSending) return;
        const text = userInput.value.trim();
        if (!text) return;
        isSending = true;
        sendBtn.disabled = true;
        voiceBtn.disabled = true;

        if (text.startsWith('/')) {
            if (handleCommand(text)) {
                userInput.value = '';
                isSending = false;
                sendBtn.disabled = false;
                voiceBtn.disabled = false;
                return;
            }
        }

        userInput.value = '';
        addUserMessage(text);
        const thinkingDiv = document.createElement("div");
        thinkingDiv.className = "thinking";
        thinkingDiv.innerText = "🦞 推演命理中...";
        chatArea.appendChild(thinkingDiv);

        try {
            const answer = await askWithPipeline(text);
            thinkingDiv.remove();
            const msgDiv = document.createElement("div");
            msgDiv.className = "message assistant";
            const roleTag = document.createElement("div");
            roleTag.className = "role-tag";
            roleTag.innerText = `🤖 ${modelSelect.options[modelSelect.selectedIndex]?.text || "AI命理师"}`;
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            msgDiv.appendChild(roleTag);
            msgDiv.appendChild(bubble);
            chatArea.appendChild(msgDiv);
            await typeWriter(bubble, answer, 15);
            conversationHistory.push({ role: "assistant", content: answer, model: modelSelect.options[modelSelect.selectedIndex]?.text });
            saveHistory();
        } catch (err) {
            thinkingDiv.remove();
            addAssistantMessage(`❌ 推演失败: ${err.message}`);
            if (conversationHistory.length && conversationHistory[conversationHistory.length-1].role === "user") {
                conversationHistory.pop();
                saveHistory();
            }
        } finally {
            isSending = false;
            sendBtn.disabled = false;
            voiceBtn.disabled = false;
        }
    }

    function clearHistory() {
        conversationHistory = [];
        saveHistory();
        renderChat();
        addAssistantMessage("命理推演记录已清空。");
    }

    function setupEventListeners() {
        sendBtn.addEventListener("click", handleSend);
        userInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                if (!isSending) handleSend();
            }
        });
        themeToggle.addEventListener("click", toggleTheme);
        settingsBtn.addEventListener("click", () => { drawer.classList.add("open"); overlay.classList.add("active"); });
        closeDrawer.addEventListener("click", () => { drawer.classList.remove("open"); overlay.classList.remove("active"); });
        overlay.addEventListener("click", () => { drawer.classList.remove("open"); overlay.classList.remove("active"); });
        clearHistoryBtn.addEventListener("click", clearHistory);
        backupBtn.addEventListener("click", exportData);
        restoreBtn.addEventListener("click", () => restoreFile.click());
        restoreFile.addEventListener("change", (e) => { if (e.target.files[0]) importData(e.target.files[0]); restoreFile.value = ""; });
        voiceBtn.addEventListener("click", startSpeech);
        insertTemplateBtn.addEventListener("click", () => {
            const idx = templateSelect.value;
            if (idx !== null) {
                const tpl = templates[parseInt(idx)];
                userInput.value = tpl.content;
            }
        });
        saveTemplateBtn.addEventListener("click", () => {
            const name = prompt("模板名称：");
            if (name && userInput.value.trim()) {
                templates.push({ name, content: userInput.value.trim() });
                saveTemplates();
                updateTemplateSelect();
                addAssistantMessage(`模板「${name}」已保存。`, "系统");
            }
        });
    }

    initSpeech();
</script>
