<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobster AI · 终极智能助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; transition: background 0.3s, color 0.3s; }
        body { margin: 0; padding: 20px; height: 100vh; display: flex; justify-content: center; align-items: center; }
        :root {
            --bg-primary: #f7f9fc;
            --bg-secondary: #ffffff;
            --text-primary: #1e2a3a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --accent: #f97316;
            --accent-hover: #ea580c;
            --header-bg: #1e2a3a;
            --header-text: white;
            --bubble-user: #f97316;
            --bubble-assistant: #eef2f6;
        }
        body.dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --accent: #f97316;
            --accent-hover: #fb923c;
            --header-bg: #0f172a;
            --header-text: #f1f5f9;
            --bubble-user: #f97316;
            --bubble-assistant: #334155;
        }
        body { background: var(--bg-primary); color: var(--text-primary); }
        .app { max-width: 1400px; width: 100%; height: 90vh; background: var(--bg-secondary); border-radius: 32px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: var(--header-bg); color: var(--header-text); padding: 12px 24px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 700; font-size: 1.3rem; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--accent); }
        .controls { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        select, button, .param-input { padding: 6px 12px; border-radius: 40px; border: none; font-size: 0.85rem; background: var(--bg-primary); color: var(--text-primary); cursor: pointer; }
        button { background: var(--accent); color: white; }
        button:hover { background: var(--accent-hover); }
        .param-input { width: 70px; text-align: center; cursor: text; }
        .api-status { font-size: 0.7rem; background: #0f172a; padding: 4px 10px; border-radius: 40px; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 85%; display: flex; flex-direction: column; }
        .message.user { align-self: flex-end; }
        .message.assistant { align-self: flex-start; }
        .bubble { padding: 12px 18px; border-radius: 24px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; overflow-x: auto; }
        .user .bubble { background: var(--bubble-user); color: white; border-bottom-right-radius: 4px; }
        .assistant .bubble { background: var(--bubble-assistant); color: var(--text-primary); border-bottom-left-radius: 4px; }
        .role-tag { font-size: 0.7rem; margin-bottom: 4px; margin-left: 12px; color: var(--text-secondary); }
        .thinking { color: var(--text-secondary); font-style: italic; font-size: 0.85rem; margin-top: 6px; }
        .input-area { padding: 20px; background: var(--bg-secondary); border-top: 1px solid var(--border); display: flex; gap: 12px; }
        textarea { flex: 1; border: 1px solid var(--border); border-radius: 28px; padding: 12px 18px; resize: none; font-size: 0.95rem; font-family: inherit; outline: none; background: var(--bg-primary); color: var(--text-primary); }
        textarea:focus { border-color: var(--accent); }
        .action-buttons { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; flex-wrap: wrap; }
        .small-btn { background: var(--border); color: var(--text-primary); font-size: 0.7rem; padding: 4px 12px; border-radius: 40px; cursor: pointer; border: none; }
        .small-btn:hover { filter: brightness(0.9); }
        .drawer { position: fixed; right: 0; top: 0; width: 350px; height: 100%; background: var(--bg-secondary); box-shadow: -2px 0 10px rgba(0,0,0,0.1); transform: translateX(100%); transition: transform 0.3s; z-index: 1000; padding: 20px; overflow-y: auto; }
        .drawer.open { transform: translateX(0); }
        .drawer h3 { margin-top: 0; }
        .drawer input, .drawer select, .drawer textarea { width: 100%; margin-bottom: 12px; padding: 8px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); }
        .close-drawer { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 20px; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 999; }
        .overlay.active { opacity: 1; visibility: visible; }
        pre code.hljs { background: transparent; }
        @media (max-width: 700px) {
            .header { flex-direction: column; align-items: stretch; }
            .message { max-width: 95%; }
            .drawer { width: 100%; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">🦞 <span>Lobster AI</span> · 终极智能</div>
        <div class="controls">
            <select id="modelSelect"></select>
            <select id="personaSelect"></select>
            <button id="themeToggle">🌓 主题</button>
            <button id="settingsBtn">⚙️ 设置</button>
            <span class="api-status" id="apiStatus">🔌 就绪</span>
        </div>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
        <textarea id="userInput" rows="2" placeholder="输入问题... 支持 /list, /add, /remove, /switch, /template 等指令"></textarea>
        <button id="voiceBtn">🎤</button>
        <button class="send" id="sendBtn">发送</button>
    </div>
    <div class="action-buttons">
        <button class="small-btn" id="clearHistoryBtn">🗑️ 清空记忆</button>
        <button class="small-btn" id="summarizeBtn">📝 摘要当前对话</button>
        <button class="small-btn" id="exportBtn">📤 导出对话</button>
        <button class="small-btn" id="uploadDocBtn">📄 上传文档</button>
        <button class="small-btn" id="templatesBtn">📋 模板库</button>
        <button class="small-btn" id="multiModelBtn">🔄 多模型对比</button>
    </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
    <button class="close-drawer" id="closeDrawer">✖</button>
    <h3>设置</h3>
    <label>温度: <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7"></label>
    <span id="tempValue">0.7</span><br>
    <label>Top P: <input type="range" id="topP" min="0" max="1" step="0.05" value="0.9"></label>
    <span id="topPValue">0.9</span><br>
    <label>频率惩罚: <input type="range" id="freqPenalty" min="0" max="2" step="0.1" value="0"></label>
    <span id="freqValue">0</span><br>
    <label>最大长度: <input type="number" id="maxTokens" value="1000" min="100" max="4000"></label><br>
    <label>自动模型推荐: <input type="checkbox" id="autoModelRecommend"></label><br>
    <hr>
    <h4>人格预设</h4>
    <select id="personaPresetSelect"></select>
    <button id="loadPersonaBtn">加载</button>
    <textarea id="customSystemPrompt" rows="4" placeholder="自定义系统提示词..."></textarea>
    <button id="savePersonaBtn">保存当前人格</button>
    <hr>
    <h4>提示词模板</h4>
    <select id="templateSelect"></select>
    <button id="insertTemplateBtn">插入</button>
    <button id="saveTemplateBtn">保存当前输入为模板</button>
    <hr>
    <h4>数据管理</h4>
    <button id="backupBtn">导出备份 (JSON)</button>
    <button id="restoreBtn">导入备份</button>
    <input type="file" id="restoreFile" style="display:none">
</div>

<script>
    const DEFAULT_MODELS = [
        { display: "MiMo-V2-Pro (OpenRouter 免费)", value: "openrouter:xiaomi/mimo-v2-pro" },
        { display: "MiMo-V2-Omni (OpenRouter 免费)", value: "openrouter:xiaomi/mimo-v2-omni" },
        { display: "Mistral-7B (HF)", value: "hf:mistralai/Mistral-7B-Instruct-v0.1" },
        { display: "Gemma-7B (HF)", value: "hf:google/gemma-7b-it" },
        { display: "GPT-3.5 Turbo (OpenAI)", value: "openai:gpt-3.5-turbo" },
        { display: "Gemini Pro (Google)", value: "google:gemini-pro" }
    ];
    const PERSONAS = {
        "顶尖分析师": "你是我的私人AI助手，身份是高级分析师、商业策略顾问。风格冷静、逻辑清晰、条理分明。回答必须分步骤，结论明确。不允许胡说八道，在回答时尽量引用数据/事实。如果问题涉及金融、科技、AI行业，请突出你的专业性。",
        "创意作家": "你是一位富有想象力的作家，擅长用生动的语言和故事表达想法。回答要充满画面感和情感，可以适当使用比喻和修辞。",
        "编程专家": "你是一位资深程序员，擅长多种编程语言和技术栈。回答时要提供代码示例、最佳实践和解释。代码格式清晰，注重可读性和效率。",
        "心理咨询师": "你是一位温暖耐心的心理咨询师，善于倾听和共情。回答时要先理解对方的情绪，再提供建议，语气柔和包容。",
        "博学家": "你是一位无所不知的学者，对历史、科学、艺术、哲学等都有深刻见解。回答要旁征博引，深入浅出。"
    };
    let templates = [
        { name: "代码解释", content: "请用中文解释以下代码的功能和实现原理：" },
        { name: "头脑风暴", content: "请为我列出关于 [主题] 的10个创新想法。" },
        { name: "润色文本", content: "请润色以下文本，使其更专业、流畅：" },
        { name: "总结要点", content: "请总结以下内容的要点，用列表形式呈现：" }
    ];
    let modelList = [];
    let conversationHistory = [];
    let currentPersona = "顶尖分析师";
    let systemPrompt = PERSONAS["顶尖分析师"];
    let temperature = 0.7, topP = 0.9, freqPenalty = 0, maxTokens = 1000;
    let autoModelRecommend = false;
    let supabaseClient = null;
    let currentUser = null;
    let USE_SUPABASE = false; // 改为 true 启用 Supabase
    const SUPABASE_URL = "https://你的项目.supabase.co";
    const SUPABASE_ANON_KEY = "你的anon密钥";
    
    const modelSelect = document.getElementById("modelSelect");
    const personaSelect = document.getElementById("personaSelect");
    const themeToggle = document.getElementById("themeToggle");
    const settingsBtn = document.getElementById("settingsBtn");
    const chatArea = document.getElementById("chatArea");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const voiceBtn = document.getElementById("voiceBtn");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");
    const summarizeBtn = document.getElementById("summarizeBtn");
    const exportBtn = document.getElementById("exportBtn");
    const uploadDocBtn = document.getElementById("uploadDocBtn");
    const templatesBtn = document.getElementById("templatesBtn");
    const multiModelBtn = document.getElementById("multiModelBtn");
    const overlay = document.getElementById("overlay");
    const drawer = document.getElementById("drawer");
    const closeDrawer = document.getElementById("closeDrawer");
    const temperatureSlider = document.getElementById("temperature");
    const tempValue = document.getElementById("tempValue");
    const topPSlider = document.getElementById("topP");
    const topPValue = document.getElementById("topPValue");
    const freqPenaltySlider = document.getElementById("freqPenalty");
    const freqValue = document.getElementById("freqValue");
    const maxTokensInput = document.getElementById("maxTokens");
    const autoModelCheck = document.getElementById("autoModelRecommend");
    const personaPresetSelect = document.getElementById("personaPresetSelect");
    const loadPersonaBtn = document.getElementById("loadPersonaBtn");
    const customSystemPrompt = document.getElementById("customSystemPrompt");
    const savePersonaBtn = document.getElementById("savePersonaBtn");
    const templateSelect = document.getElementById("templateSelect");
    const insertTemplateBtn = document.getElementById("insertTemplateBtn");
    const saveTemplateBtn = document.getElementById("saveTemplateBtn");
    const backupBtn = document.getElementById("backupBtn");
    const restoreBtn = document.getElementById("restoreBtn");
    const restoreFile = document.getElementById("restoreFile");

    function init() {
        loadTheme();
        loadModels();
        loadHistory();
        loadPersonas();
        loadTemplates();
        initSupabase();
        setupEventListeners();
        renderChat();
    }
    function loadTheme() {
        const dark = localStorage.getItem("theme") === "dark";
        if (dark) document.body.classList.add("dark");
        themeToggle.innerText = dark ? "☀️ 亮色" : "🌙 暗色";
    }
    function toggleTheme() {
        document.body.classList.toggle("dark");
        const dark = document.body.classList.contains("dark");
        localStorage.setItem("theme", dark ? "dark" : "light");
        themeToggle.innerText = dark ? "☀️ 亮色" : "🌙 暗色";
    }
    function loadModels() {
        const stored = localStorage.getItem("model_list");
        if (stored) try { modelList = JSON.parse(stored); } catch(e) {}
        if (!modelList || modelList.length === 0) modelList = [...DEFAULT_MODELS];
        renderModelSelect();
    }
    function renderModelSelect() {
        modelSelect.innerHTML = "";
        modelList.forEach((m, idx) => {
            const opt = document.createElement("option");
            opt.value = m.value;
            opt.textContent = `${idx+1}. ${m.display}`;
            modelSelect.appendChild(opt);
        });
    }
    function saveModels() { localStorage.setItem("model_list", JSON.stringify(modelList)); }
    function loadHistory() {
        const stored = localStorage.getItem("chat_history");
        if (stored) try { conversationHistory = JSON.parse(stored); } catch(e) {}
        else conversationHistory = [];
    }
    function saveHistory() {
        if (conversationHistory.length > 100) conversationHistory = conversationHistory.slice(-100);
        localStorage.setItem("chat_history", JSON.stringify(conversationHistory));
    }
    function loadPersonas() {
        personaSelect.innerHTML = "";
        for (let name in PERSONAS) {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            personaSelect.appendChild(opt);
        }
        personaSelect.value = currentPersona;
        customSystemPrompt.value = systemPrompt;
        personaPresetSelect.innerHTML = "";
        for (let name in PERSONAS) {
            const opt = document.createElement("option");
            opt.value = name;
            opt.textContent = name;
            personaPresetSelect.appendChild(opt);
        }
    }
    function loadTemplates() {
        const stored = localStorage.getItem("templates");
        if (stored) try { templates = JSON.parse(stored); } catch(e) {}
        updateTemplateSelect();
    }
    function updateTemplateSelect() {
        templateSelect.innerHTML = "";
        templates.forEach((t, idx) => {
            const opt = document.createElement("option");
            opt.value = idx;
            opt.textContent = t.name;
            templateSelect.appendChild(opt);
        });
    }
    function saveTemplates() { localStorage.setItem("templates", JSON.stringify(templates)); }
    function initSupabase() {
        if (!USE_SUPABASE || SUPABASE_URL === "https://你的项目.supabase.co") return;
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                currentUser = session.user;
                loadCloudData();
            } else {
                showLoginPanel();
            }
        });
    }
    function showLoginPanel() {
        const panel = document.createElement("div");
        panel.className = "login-panel";
        panel.innerHTML = `<h3>🔐 登录 Supabase</h3><input id="loginEmail" placeholder="邮箱"><input id="loginPwd" placeholder="密码" type="password"><button id="loginBtn">登录</button><button id="signupBtn">注册</button>`;
        chatArea.appendChild(panel);
        document.getElementById("loginBtn").onclick = async () => {
            const email = document.getElementById("loginEmail").value;
            const pwd = document.getElementById("loginPwd").value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pwd });
            if (error) alert(error.message);
            else { currentUser = data.user; panel.remove(); loadCloudData(); }
        };
        document.getElementById("signupBtn").onclick = async () => {
            const email = document.getElementById("loginEmail").value;
            const pwd = document.getElementById("loginPwd").value;
            const { data, error } = await supabaseClient.auth.signUp({ email, password: pwd });
            if (error) alert(error.message);
            else { currentUser = data.user; panel.remove(); loadCloudData(); }
        };
    }
    async function loadCloudData() {
        const { data: historyData } = await supabaseClient.from("conversations").select("*").eq("user_id", currentUser.id).order("created_at", { ascending: true });
        if (historyData && historyData.length) {
            conversationHistory = historyData.map(h => ({ role: h.role, content: h.content, model: h.model }));
            renderChat();
        }
        const { data: modelsData } = await supabaseClient.from("user_models").select("*").eq("user_id", currentUser.id);
        if (modelsData && modelsData.length) {
            modelList = modelsData.map(m => ({ display: m.display, value: m.model_value }));
            renderModelSelect();
        }
    }
    function renderChat() {
        chatArea.innerHTML = "";
        for (let msg of conversationHistory) {
            addMessageToUI(msg.role, msg.content, msg.model);
        }
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    function addMessageToUI(role, content, modelName = "") {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role}`;
        const roleTag = document.createElement("div");
        roleTag.className = "role-tag";
        roleTag.innerText = role === "user" ? "你" : (modelName ? `🤖 ${modelName}` : "🦞 助手");
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        if (role === "assistant") {
            bubble.innerHTML = marked.parse(content);
            bubble.querySelectorAll("pre code").forEach(block => hljs.highlightElement(block));
        } else {
            bubble.innerText = content;
        }
        msgDiv.appendChild(roleTag);
        msgDiv.appendChild(bubble);
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    function addUserMessage(text) {
        addMessageToUI("user", text);
        conversationHistory.push({ role: "user", content: text });
        saveHistory();
        if (USE_SUPABASE && supabaseClient && currentUser) {
            supabaseClient.from("conversations").insert({ user_id: currentUser.id, role: "user", content: text }).then();
        }
    }
    function addAssistantMessage(text, modelName = "") {
        addMessageToUI("assistant", text, modelName);
        conversationHistory.push({ role: "assistant", content: text, model: modelName });
        saveHistory();
        if (USE_SUPABASE && supabaseClient && currentUser) {
            supabaseClient.from("conversations").insert({ user_id: currentUser.id, role: "assistant", content: text, model: modelName }).then();
        }
    }
    let typingInterval;
    function typeWriter(element, text, speed = 20) {
        let i = 0;
        element.innerHTML = "";
        return new Promise(resolve => {
            typingInterval = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text[i];
                    i++;
                } else {
                    clearInterval(typingInterval);
                    resolve();
                }
            }, speed);
        });
    }
    async function callAPI(model, prompt, params = {}) {
        const finalParams = { ...{ temperature, topP, freqPenalty, maxTokens }, ...params };
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model, prompt, ...finalParams })
        });
        if (!response.ok) throw new Error(await response.text());
        const data = await response.json();
        return data.content;
    }
    function buildContextPrompt(userInputText) {
        const recent = conversationHistory.slice(-8);
        let context = "";
        for (let msg of recent) context += `${msg.role === "user" ? "用户" : "助手"}: ${msg.content}\n`;
        context += `用户: ${userInputText}\n助手:`;
        return `${systemPrompt}\n\n对话历史:\n${context}`;
    }
    async function askWithPipeline(userMessage) {
        let selectedModel = modelSelect.value;
        if (autoModelRecommend) {
            if (userMessage.includes("代码") || userMessage.includes("编程")) selectedModel = "hf:mistralai/Mistral-7B-Instruct-v0.1";
            else if (userMessage.includes("写") || userMessage.includes("文章")) selectedModel = "openrouter:xiaomi/mimo-v2-pro";
            else selectedModel = modelSelect.value;
        }
        const fullPrompt = buildContextPrompt(userMessage);
        const answer = await callAPI(selectedModel, fullPrompt);
        return answer;
    }
    function handleCommand(input) {
        const trimmed = input.trim().toLowerCase();
        const parts = trimmed.split(/\s+/);
        const cmd = parts[0];
        if (cmd === '/list') {
            let msg = '📋 当前可用模型列表：\n';
            modelList.forEach((m, idx) => msg += `${idx+1}. ${m.display} → ${m.value}\n`);
            addAssistantMessage(msg, '系统指令');
            return true;
        }
        if (cmd === '/switch') {
            if (parts.length < 2) { addAssistantMessage('用法：/switch <序号> 或 /switch <模型名>', '系统指令'); return true; }
            const target = parts.slice(1).join(' ');
            let idx = parseInt(target);
            if (!isNaN(idx) && idx >= 1 && idx <= modelList.length) {
                modelSelect.value = modelList[idx-1].value;
                addAssistantMessage(`✅ 已切换到 ${modelList[idx-1].display}`, '系统指令');
                return true;
            }
            const matched = modelList.find(m => m.display.toLowerCase().includes(target));
            if (matched) {
                modelSelect.value = matched.value;
                addAssistantMessage(`✅ 已切换到 ${matched.display}`, '系统指令');
                return true;
            }
            addAssistantMessage(`未找到匹配的模型：${target}`, '系统指令');
            return true;
        }
        if (cmd === '/add') {
            if (parts.length < 3) { addAssistantMessage('用法：/add "显示名" 模型标识符', '系统指令'); return true; }
            let display, value;
            if (input.match(/^\/add\s+"([^"]+)"\s+(\S+)/)) {
                const match = input.match(/^\/add\s+"([^"]+)"\s+(\S+)/);
                display = match[1]; value = match[2];
            } else {
                display = parts[1]; value = parts[2];
            }
            if (modelList.some(m => m.value === value)) { addAssistantMessage(`模型标识符 ${value} 已存在`, '系统指令'); return true; }
            modelList.push({ display, value });
            saveModels();
            renderModelSelect();
            addAssistantMessage(`✅ 已添加模型：${display} (${value})`, '系统指令');
            return true;
        }
        if (cmd === '/remove') {
            if (parts.length < 2) { addAssistantMessage('用法：/remove <序号> 或 /remove <模型名>', '系统指令'); return true; }
            const target = parts.slice(1).join(' ');
            let idx = parseInt(target);
            let removed = null;
            if (!isNaN(idx) && idx >= 1 && idx <= modelList.length) removed = modelList.splice(idx-1, 1)[0];
            else {
                const idxMatch = modelList.findIndex(m => m.display.toLowerCase().includes(target));
                if (idxMatch !== -1) removed = modelList.splice(idxMatch, 1)[0];
            }
            if (removed) {
                saveModels();
                renderModelSelect();
                addAssistantMessage(`🗑️ 已删除模型：${removed.display}`, '系统指令');
            } else addAssistantMessage(`未找到要删除的模型：${target}`, '系统指令');
            return true;
        }
        if (cmd === '/template') {
            const tplName = parts.slice(1).join(' ');
            const tpl = templates.find(t => t.name.toLowerCase().includes(tplName));
            if (tpl) { userInput.value = tpl.content; addAssistantMessage(`📋 已插入模板：${tpl.name}`, '系统指令'); }
            else addAssistantMessage(`未找到模板：${tplName}`, '系统指令');
            return true;
        }
        return false;
    }
    let recognition;
    function initSpeech() {
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.interimResults = false;
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                userInput.value = text;
            };
            recognition.onerror = (e) => alert('语音识别错误: ' + e.error);
        } else alert('浏览器不支持语音输入');
    }
    function startSpeech() {
        if (recognition) recognition.start();
    }
    async function summarizeConversation() {
        if (conversationHistory.length === 0) { addAssistantMessage("暂无对话可总结。"); return; }
        const summaryPrompt = `请总结以下对话的核心内容，用简洁的语言概括主要讨论的问题和结论：\n${conversationHistory.map(m => `${m.role}: ${m.content}`).join('\n')}`;
        const summary = await callAPI(modelSelect.value, summaryPrompt);
        addAssistantMessage(`📝 对话摘要：\n${summary}`, "摘要助手");
    }
    function exportData() {
        const data = {
            models: modelList,
            history: conversationHistory,
            templates: templates,
            persona: currentPersona,
            systemPrompt: systemPrompt,
            settings: { temperature, topP, freqPenalty, maxTokens, autoModelRecommend }
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `lobster_backup_${new Date().toISOString()}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }
    function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.models) { modelList = data.models; saveModels(); renderModelSelect(); }
                if (data.history) { conversationHistory = data.history; saveHistory(); renderChat(); }
                if (data.templates) { templates = data.templates; saveTemplates(); updateTemplateSelect(); }
                if (data.persona) { currentPersona = data.persona; personaSelect.value = currentPersona; systemPrompt = data.systemPrompt || PERSONAS[currentPersona]; customSystemPrompt.value = systemPrompt; }
                if (data.settings) {
                    temperature = data.settings.temperature || 0.7;
                    topP = data.settings.topP || 0.9;
                    freqPenalty = data.settings.freqPenalty || 0;
                    maxTokens = data.settings.maxTokens || 1000;
                    autoModelRecommend = data.settings.autoModelRecommend || false;
                    temperatureSlider.value = temperature; tempValue.innerText = temperature;
                    topPSlider.value = topP; topPValue.innerText = topP;
                    freqPenaltySlider.value = freqPenalty; freqValue.innerText = freqPenalty;
                    maxTokensInput.value = maxTokens;
                    autoModelCheck.checked = autoModelRecommend;
                }
                addAssistantMessage("✅ 数据导入成功！", "系统");
            } catch (err) { alert("导入失败: " + err.message); }
        };
        reader.readAsText(file);
    }
    async function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;
        if (text.startsWith('/')) {
            if (handleCommand(text)) { userInput.value = ''; return; }
        }
        userInput.value = '';
        addUserMessage(text);
        const thinkingDiv = document.createElement("div");
        thinkingDiv.className = "thinking";
        thinkingDiv.innerText = "🦞 思考中...";
        chatArea.appendChild(thinkingDiv);
        try {
            const answer = await askWithPipeline(text);
            thinkingDiv.remove();
            const msgDiv = document.createElement("div");
            msgDiv.className = "message assistant";
            const roleTag = document.createElement("div");
            roleTag.className = "role-tag";
            roleTag.innerText = `🤖 ${modelSelect.options[modelSelect.selectedIndex]?.text || "AI"}`;
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            msgDiv.appendChild(roleTag);
            msgDiv.appendChild(bubble);
            chatArea.appendChild(msgDiv);
            await typeWriter(bubble, answer, 15);
            conversationHistory.push({ role: "assistant", content: answer, model: modelSelect.options[modelSelect.selectedIndex]?.text });
            saveHistory();
            if (USE_SUPABASE && supabaseClient && currentUser) {
                supabaseClient.from("conversations").insert({ user_id: currentUser.id, role: "assistant", content: answer, model: modelSelect.options[modelSelect.selectedIndex]?.text }).then();
            }
        } catch (err) {
            thinkingDiv.remove();
            addAssistantMessage(`❌ 调用失败: ${err.message}`);
            if (conversationHistory.length && conversationHistory[conversationHistory.length-1].role === "user") {
                conversationHistory.pop();
                saveHistory();
            }
        }
    }
    function setupEventListeners() {
        sendBtn.addEventListener("click", handleSend);
        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); } });
        themeToggle.addEventListener("click", toggleTheme);
        settingsBtn.addEventListener("click", () => { drawer.classList.add("open"); overlay.classList.add("active"); });
        closeDrawer.addEventListener("click", () => { drawer.classList.remove("open"); overlay.classList.remove("active"); });
        overlay.addEventListener("click", () => { drawer.classList.remove("open"); overlay.classList.remove("active"); });
        clearHistoryBtn.addEventListener("click", () => { conversationHistory = []; saveHistory(); renderChat(); addAssistantMessage("历史记忆已清空。"); });
        summarizeBtn.addEventListener("click", summarizeConversation);
        exportBtn.addEventListener("click", exportData);
        restoreBtn.addEventListener("click", () => restoreFile.click());
        restoreFile.addEventListener("change", (e) => { if (e.target.files[0]) importData(e.target.files[0]); restoreFile.value = ""; });
        uploadDocBtn.addEventListener("click", () => alert("文档上传功能需配合 Supabase Storage 实现，暂未集成完整示例。"));
        templatesBtn.addEventListener("click", () => { drawer.classList.add("open"); overlay.classList.add("active"); });
        multiModelBtn.addEventListener("click", async () => {
            const lastUser = [...conversationHistory].reverse().find(m => m.role === "user");
            if (!lastUser) { addAssistantMessage("请先发送一条消息。"); return; }
            const context = buildContextPrompt(lastUser.content);
            const compareModels = modelList.slice(0, 3);
            const results = await Promise.all(compareModels.map(m => callAPI(m.value, context, { maxTokens: 800 })));
            let msg = "📊 多模型对比结果：\n\n";
            compareModels.forEach((m, i) => msg += `${i+1}. ${m.display}:\n${results[i]}\n\n`);
            addAssistantMessage(msg, "多模型对比");
        });
        voiceBtn.addEventListener("click", startSpeech);
        temperatureSlider.addEventListener("input", () => { temperature = parseFloat(temperatureSlider.value); tempValue.innerText = temperature; });
        topPSlider.addEventListener("input", () => { topP = parseFloat(topPSlider.value); topPValue.innerText = topP; });
        freqPenaltySlider.addEventListener("input", () => { freqPenalty = parseFloat(freqPenaltySlider.value); freqValue.innerText = freqPenalty; });
        maxTokensInput.addEventListener("change", () => { maxTokens = parseInt(maxTokensInput.value); });
        autoModelCheck.addEventListener("change", () => { autoModelRecommend = autoModelCheck.checked; });
        loadPersonaBtn.addEventListener("click", () => {
            const selected = personaPresetSelect.value;
            if (PERSONAS[selected]) {
                systemPrompt = PERSONAS[selected];
                customSystemPrompt.value = systemPrompt;
                currentPersona = selected;
                addAssistantMessage(`人格已切换为「${selected}」。`, "系统");
            }
        });
        savePersonaBtn.addEventListener("click", () => {
            const newPrompt = customSystemPrompt.value;
            if (newPrompt) {
                systemPrompt = newPrompt;
                currentPersona = "自定义";
                addAssistantMessage("自定义人格已保存。", "系统");
            }
        });
        insertTemplateBtn.addEventListener("click", () => {
            const idx = templateSelect.value;
            if (idx !== null) {
                const tpl = templates[parseInt(idx)];
                userInput.value = tpl.content;
            }
        });
        saveTemplateBtn.addEventListener("click", () => {
            const name = prompt("模板名称：");
            if (name && userInput.value.trim()) {
                templates.push({ name, content: userInput.value.trim() });
                saveTemplates();
                updateTemplateSelect();
                addAssistantMessage(`模板「${name}」已保存。`, "系统");
            }
        });
        personaSelect.addEventListener("change", () => {
            const name = personaSelect.value;
            if (PERSONAS[name]) {
                systemPrompt = PERSONAS[name];
                currentPersona = name;
                customSystemPrompt.value = systemPrompt;
                addAssistantMessage(`人格已切换为「${name}」。`, "系统");
            }
        });
    }
    init();
    if ('webkitSpeechRecognition' in window) initSpeech();
</script>
